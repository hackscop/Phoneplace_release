<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhonePlace Kenya | Premium Smartphones</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #ffffff; color: #111111; margin: 0; padding: 0; }
        header { background-color: #ffffff; padding: 25px 20px; text-align: center; border-bottom: 2px solid #25D366; }
        h1 { margin: 0; color: #111111; text-transform: uppercase; letter-spacing: 2px; font-size: 26px; font-weight: 800; }
        p.subtitle { color: #666666; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; margin-top: 8px; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: #ffffff; padding: 25px 20px; border-radius: 12px; text-align: center; border: 1px solid #e1e4e8; transition: all 0.3s ease; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .card:hover { transform: translateY(-4px); border-color: #25D366; box-shadow: 0 8px 20px rgba(37,211,102,0.1); }
        .card h3 { font-size: 17px; margin: 10px 0; color: #111111; font-weight: 700; line-height: 1.4; }
        .card p.price { color: #25D366; font-weight: 800; font-size: 16px; margin: 15px 0 5px 0; }
        .card p.stock-status { font-size: 12px; font-weight: 600; text-transform: uppercase; margin: 0; padding: 4px 8px; display: inline-block; border-radius: 4px; }
        .in-stock { background-color: #e8fcf0; color: #25D366; }
        .out-of-stock { background-color: #ffebe9; color: #ff4d4d; }
    </style>
</head>
<body>

<header>
    <h1>PhonePlace Kenya</h1>
    <p class="subtitle">Premium Smartphones & Mobile Tech</p>
</header>

<div class="container">
    <div class="grid" id="product-grid">
        <!-- PhonePlace inventory will display here dynamically -->
    </div>
</div>

<script>
    // Exact mapping of your inventory array
    const products = [
        { name: "Samsung Galaxy S26 Ultra 5G", price: "KES 190,000", stock: "In Stock" },
        { name: "Samsung Galaxy A57", price: "KES 65,000", stock: "In Stock" },
        { name: "iPhone 17 Pro Max", price: "KES 210,000", stock: "In Stock" },
        { name: "Google Pixel 10 Pro XL", price: "KES 150,000", stock: "In Stock" },
        { name: "Infinix Note 60 Pro", price: "KES 42,000", stock: "In Stock" },
        { name: "Oppo Reno15 Pro", price: "KES 78,500", stock: "In Stock" },
        { name: "Samsung Galaxy A26", price: "KES 35,000", stock: "Out of Stock" }
    ];

    const grid = document.getElementById('product-grid');
    products.forEach(p => {
        const stockClass = p.stock === "In Stock" ? "in-stock" : "out-of-stock";
        grid.innerHTML += `
            <div class="card">
                <h3>${p.name}</h3>
                <p class="price">${p.price}</p>
                <p class="stock-status ${stockClass}">${p.stock}</p>
            </div>
        `;
    });
</script>

<script src="widget.js"></script>

</body>
</html>
